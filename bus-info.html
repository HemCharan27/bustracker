<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracker - Bus Information</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        :root {
            --bg: #f2efe6;
            --ink: #172620;
            --muted: #58685d;
            --card: rgba(255, 252, 245, 0.86);
            --line: rgba(23, 38, 32, 0.12);
            --green: #245b46;
            --green-soft: #2f7a5f;
            --amber: #d39a36;
            --danger: #b9554f;
            --shadow: 0 24px 60px rgba(53, 49, 35, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #f8f3e7 0%, #eee6d5 100%);
        }

        .app {
            width: min(1200px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header a {
            color: var(--green-soft);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header h1 {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 2rem;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .card h2 {
            margin: 0 0 20px 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.5rem;
            color: var(--ink);
        }

        .card h3 {
            margin: 0 0 4px 0;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .bus-number {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 24px;
        }

        .info-grid {
            display: grid;
            gap: 16px;
        }

        .info-item {
            border-bottom: 1px solid var(--line);
            padding-bottom: 12px;
        }

        .info-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ink);
            margin-top: 4px;
        }

        .button-group {
            display: grid;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            font: inherit;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--green), var(--green-soft));
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.7);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        #map {
            width: 100%;
            height: 400px;
            border-radius: 14px;
            border: 1px solid var(--line);
            margin-bottom: 16px;
        }

        .location-info {
            padding: 12px;
            background: rgba(36, 91, 70, 0.1);
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .feedback-section {
            grid-column: 1 / -1;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--ink);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--ink);
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .rating-group {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .star {
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.3;
            transition: all 0.2s ease;
        }

        .star:hover,
        .star.active {
            opacity: 1;
            color: var(--amber);
        }

        .message {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            display: none;
            font-size: 0.95rem;
            animation: slideIn 0.3s ease;
        }

        .message.visible {
            display: block;
        }

        .message.success {
            background: rgba(211, 154, 54, 0.14);
            border: 1px solid rgba(211, 154, 54, 0.2);
            color: var(--amber);
        }

        .message.error {
            background: rgba(185, 85, 79, 0.1);
            border: 1px solid rgba(185, 85, 79, 0.18);
            color: var(--danger);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 960px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .app {
                padding-top: 20px;
            }

            .header {
                flex-direction: column;
                gap: 16px;
            }

            #map {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <div class="header">
            <h1>Bus Information</h1>
            <a href="bus-dashboard.html">← Back to Buses</a>
        </div>

        <div class="content-grid">
            <!-- Bus Details Section -->
            <div class="card">
                <div class="bus-number" id="busNumber">-</div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <h3>Number Plate</h3>
                        <div class="info-value" id="busPlate">-</div>
                    </div>
                    <div class="info-item">
                        <h3>Driver Name</h3>
                        <div class="info-value" id="driverName">-</div>
                    </div>
                    <div class="info-item">
                        <h3>Driver Contact</h3>
                        <div class="info-value" id="driverPhone">-</div>
                    </div>
                    <div class="info-item">
                        <h3>Distance from You</h3>
                        <div class="info-value" id="distance">Calculating...</div>
                    </div>
                    <div class="info-item">
                        <h3>Last Updated</h3>
                        <div class="info-value" id="lastUpdated">-</div>
                    </div>
                </div>

                <div class="button-group">
                    <a href="tel:" id="callBtn" class="btn btn-primary">Call Driver</a>
                    <button class="btn btn-secondary" id="backBtn">Back to List</button>
                </div>
            </div>

            <!-- Map Section -->
            <div class="card">
                <h2>Live Location</h2>
                <div id="map"></div>
                <div class="location-info">
                    <span class="status-dot"></span>
                    Live Location - Updates every 30 seconds
                </div>
            </div>

            <!-- Feedback Section -->
            <div class="card feedback-section">
                <h2>Share Your Feedback</h2>
                <form id="feedbackForm">
                    <div class="form-group">
                        <label>How would you rate this bus?</label>
                        <div class="rating-group" id="ratingGroup">
                            <span class="star" data-rating="1">★</span>
                            <span class="star" data-rating="2">★</span>
                            <span class="star" data-rating="3">★</span>
                            <span class="star" data-rating="4">★</span>
                            <span class="star" data-rating="5">★</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="category">Feedback Category *</label>
                        <select id="category" required>
                            <option value="">- Select category -</option>
                            <option value="cleanliness">Cleanliness</option>
                            <option value="punctuality">Punctuality</option>
                            <option value="comfort">Comfort</option>
                            <option value="driver_behavior">Driver Behavior</option>
                            <option value="safety">Safety</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="feedbackText">Your Feedback *</label>
                        <textarea id="feedbackText" placeholder="Share your experience..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Submit Feedback</button>
                    <div id="feedbackMessage" class="message"></div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "http://localhost:3000";
        const STUDENT_STORAGE_KEY = "busTrackerStudentSessionV2";
        const FEEDBACK_STORAGE_KEY = "busFeedback";

        let busData = null;
        let userLocation = { latitude: null, longitude: null };
        let map = null;
        let busMarker = null;
        let userMarker = null;
        let selectedRating = 0;

        // Get bus ID from URL
        function getBusIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            const busId = params.get("busId");
            if (!busId) {
                window.location.href = "bus-dashboard.html";
            }
            return busId;
        }

        // Get student session
        function getStudentSession() {
            const session = localStorage.getItem(STUDENT_STORAGE_KEY);
            if (!session) {
                window.location.href = "student-login.html";
            }
            return JSON.parse(session);
        }

        // Calculate distance
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = 
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // Get user location
        function getUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation.latitude = position.coords.latitude;
                        userLocation.longitude = position.coords.longitude;
                        updateDistance();
                    }
                );
            }
        }

        // Fetch bus data
        async function fetchBusData() {
            try {
                const response = await fetch(`${API_URL}/active-buses`);
                const data = await response.json();
                
                if (!data.success) throw new Error("Failed to fetch buses");
                
                const busId = getBusIdFromURL();
                busData = data.buses.find(b => b.id === busId);
                
                if (!busData) {
                    alert("Bus not found");
                    window.location.href = "bus-dashboard.html";
                    return;
                }

                displayBusData();
                initializeMap();
            } catch (error) {
                console.error("Error fetching bus data:", error);
            }
        }

        // Display bus data
        function displayBusData() {
            document.getElementById("busNumber").textContent = busData.busRepresentationNumber;
            document.getElementById("busPlate").textContent = busData.busNumberPlate;
            document.getElementById("driverName").textContent = busData.driverName;
            document.getElementById("driverPhone").textContent = busData.phone;
            document.getElementById("callBtn").href = `tel:+91${busData.phone}`;
            
            const lastUpdate = new Date(busData.currentLocation.timestamp);
            document.getElementById("lastUpdated").textContent = lastUpdate.toLocaleTimeString();
            
            updateDistance();
        }

        // Update distance
        function updateDistance() {
            if (!userLocation.latitude || !userLocation.longitude) {
                document.getElementById("distance").textContent = "Unknown";
                return;
            }

            const distance = calculateDistance(
                userLocation.latitude,
                userLocation.longitude,
                busData.currentLocation.latitude,
                busData.currentLocation.longitude
            );

            document.getElementById("distance").textContent = `${distance.toFixed(1)} km`;
        }

        // Initialize map
        function initializeMap() {
            const busLat = busData.currentLocation.latitude;
            const busLng = busData.currentLocation.longitude;

            map = L.map("map").setView([busLat, busLng], 13);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "&copy; OpenStreetMap contributors",
                maxZoom: 19
            }).addTo(map);

            // Bus marker
            busMarker = L.marker([busLat, busLng]).addTo(map)
                .bindPopup(`<b>${busData.busRepresentationNumber}</b><br>${busData.driverName}`)
                .openPopup();

            // User marker (if location available)
            if (userLocation.latitude && userLocation.longitude) {
                userMarker = L.marker(
                    [userLocation.latitude, userLocation.longitude],
                    { icon: L.icon({ iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png", shadowUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-shadow.png", iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] }) }
                ).addTo(map).bindPopup("Your Location");

                // Fit both markers in view
                const group = new L.featureGroup([busMarker, userMarker]);
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // Rating stars
        document.querySelectorAll(".star").forEach(star => {
            star.addEventListener("click", () => {
                selectedRating = parseInt(star.dataset.rating);
                document.querySelectorAll(".star").forEach((s, idx) => {
                    s.classList.toggle("active", idx < selectedRating);
                });
            });
        });

        // Feedback form
        document.getElementById("feedbackForm").addEventListener("submit", (e) => {
            e.preventDefault();

            const category = document.getElementById("category").value;
            const feedbackText = document.getElementById("feedbackText").value.trim();

            if (!category || !feedbackText) {
                showMessage("feedbackMessage", "Please fill all fields", "error");
                return;
            }

            // Store feedback
            const feedback = {
                busId: busData.id,
                busNumber: busData.busRepresentationNumber,
                driverName: busData.driverName,
                rating: selectedRating,
                category,
                feedback: feedbackText,
                timestamp: new Date().toISOString(),
                studentId: getStudentSession()._id
            };

            let feedbacks = JSON.parse(localStorage.getItem(FEEDBACK_STORAGE_KEY) || "[]");
            feedbacks.push(feedback);
            localStorage.setItem(FEEDBACK_STORAGE_KEY, JSON.stringify(feedbacks));

            showMessage("feedbackMessage", "Feedback submitted successfully!", "success");
            document.getElementById("feedbackForm").reset();
            selectedRating = 0;
            document.querySelectorAll(".star").forEach(s => s.classList.remove("active"));
        });

        function showMessage(elementId, text, type) {
            const element = document.getElementById(elementId);
            element.className = `message ${type} visible`;
            element.textContent = text;
            setTimeout(() => {
                element.className = "message";
            }, 3000);
        }

        // Back button
        document.getElementById("backBtn").addEventListener("click", () => {
            window.location.href = "bus-dashboard.html";
        });

        // Initialize
        (function init() {
            getStudentSession();
            getUserLocation();
            fetchBusData();
        })();
    </script>
</body>
</html>
