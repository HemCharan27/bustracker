<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracker - Login</title>
    <style>
        :root {
            --bg: #f2efe6;
            --ink: #172620;
            --muted: #58685d;
            --card: rgba(255, 252, 245, 0.86);
            --line: rgba(23, 38, 32, 0.12);
            --green: #245b46;
            --green-soft: #2f7a5f;
            --amber: #d39a36;
            --danger: #b9554f;
            --shadow: 0 24px 60px rgba(53, 49, 35, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #f8f3e7 0%, #eee6d5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 0;
        }

        .container {
            width: min(600px, calc(100% - 32px));
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 32px;
            background: linear-gradient(135deg, rgba(36, 91, 70, 0.1) 0%, rgba(47, 122, 95, 0.05) 100%);
            border-bottom: 1px solid var(--line);
        }

        .header h1 {
            margin: 0 0 8px 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 2rem;
            color: var(--green);
        }

        .header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid var(--line);
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: var(--muted);
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--green);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--green-soft));
        }

        .tab-btn:hover {
            background: rgba(36, 91, 70, 0.05);
        }

        .content {
            padding: 32px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.92rem;
            font-weight: 500;
            color: var(--ink);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--ink);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: rgba(36, 91, 70, 0.42);
            box-shadow: 0 0 0 4px rgba(36, 91, 70, 0.1);
        }

        .form-group input::placeholder {
            color: var(--muted);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 12px 24px;
            cursor: pointer;
            font: inherit;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg, var(--green), var(--green-soft));
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(36, 91, 70, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            display: none;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
        }

        .message.visible {
            display: block;
        }

        .message.info {
            background: rgba(36, 91, 70, 0.1);
            border: 1px solid rgba(36, 91, 70, 0.18);
            color: var(--green);
        }

        .message.success {
            background: rgba(211, 154, 54, 0.14);
            border: 1px solid rgba(211, 154, 54, 0.2);
            color: var(--amber);
        }

        .message.error {
            background: rgba(185, 85, 79, 0.1);
            border: 1px solid rgba(185, 85, 79, 0.18);
            color: var(--danger);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hint-text {
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .container {
                border-radius: 20px;
            }

            .header {
                padding: 24px;
            }

            .header h1 {
                font-size: 1.6rem;
            }

            .content {
                padding: 24px;
            }

            .tab-btn {
                padding: 14px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bus Tracker</h1>
            <p>Real-time bus tracking and location sharing</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="student">Student Login</button>
            <button class="tab-btn" data-tab="driver">Driver Login</button>
        </div>

        <div class="content">
            <!-- Student Login Form -->
            <div id="student" class="form-section active">
                <form id="studentForm">
                    <div class="form-group">
                        <label for="studentRoll">Roll Number / Registration Number *</label>
                        <input 
                            id="studentRoll" 
                            type="text" 
                            placeholder="e.g., 21BCS001"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="studentPassword">Password *</label>
                        <input 
                            id="studentPassword" 
                            type="password" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <p class="hint-text">💡 First time? Create an account with your roll number and a password.</p>

                    <div class="button-group">
                        <button type="submit" class="btn-primary" id="studentLoginBtn">Login</button>
                    </div>

                    <div id="studentMessage" class="message"></div>
                </form>
            </div>

            <!-- Driver Login Form -->
            <div id="driver" class="form-section">
                <form id="driverForm">
                    <div class="form-group">
                        <label for="driverPhone">Phone Number *</label>
                        <input 
                            id="driverPhone" 
                            type="tel" 
                            placeholder="10-digit number"
                            pattern="[0-9]{10}"
                            required
                        >
                    </div>

                    <p class="hint-text">💡 Enter your 10-digit phone number to access your workspace.</p>

                    <div class="button-group">
                        <button type="submit" class="btn-primary" id="driverLoginBtn">Login</button>
                    </div>

                    <div id="driverMessage" class="message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:3000";
        const STUDENT_STORAGE_KEY = "busTrackerStudentSessionV2";
        const DRIVER_STORAGE_KEY = "busTrackerDriverSessionV2";

        // Tab switching
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const tabName = btn.dataset.tab;

                // Update active tab
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

                // Update active form section
                document.querySelectorAll(".form-section").forEach(section => {
                    section.classList.remove("active");
                });
                document.getElementById(tabName).classList.add("active");

                // Clear messages
                setMessage("studentMessage", "", "");
                setMessage("driverMessage", "", "");
            });
        });

        // Utility function
        function setMessage(elementId, text, type) {
            const element = document.getElementById(elementId);
            if (!text) {
                element.className = "message";
                element.textContent = "";
                return;
            }
            element.className = `message ${type} visible`;
            element.textContent = text;
        }

        // Student Login Handler
        document.getElementById("studentForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const rollNo = document.getElementById("studentRoll").value.trim();
            const password = document.getElementById("studentPassword").value.trim();

            if (!rollNo || !password) {
                setMessage("studentMessage", "Please enter roll number and password", "error");
                return;
            }

            setMessage("studentMessage", "Signing in...", "info");
            const submitBtn = document.getElementById("studentLoginBtn");
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/student-login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ regNo: rollNo, password })
                });

                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.message || "Login failed");
                }

                localStorage.setItem(STUDENT_STORAGE_KEY, JSON.stringify(data.user));
                setMessage("studentMessage", "Login successful! Redirecting...", "success");
                
                setTimeout(() => {
                    window.location.href = "bus-dashboard.html";
                }, 500);
            } catch (error) {
                setMessage("studentMessage", error.message || "Unable to connect. Please try again.", "error");
                submitBtn.disabled = false;
            }
        });

        // Driver Login Handler
        document.getElementById("driverForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const phone = document.getElementById("driverPhone").value.trim();

            if (!phone || phone.length < 10) {
                setMessage("driverMessage", "Please enter a valid 10-digit phone number", "error");
                return;
            }

            setMessage("driverMessage", "Signing in...", "info");
            const submitBtn = document.getElementById("driverLoginBtn");
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: "Driver", phone: phone, role: "driver" })
                });

                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.message || "Login failed");
                }

                localStorage.setItem(DRIVER_STORAGE_KEY, JSON.stringify(data.user));
                setMessage("driverMessage", "Login successful! Redirecting...", "success");
                
                setTimeout(() => {
                    window.location.href = "driver-workspace.html";
                }, 500);
            } catch (error) {
                setMessage("driverMessage", error.message || "Unable to connect. Please try again.", "error");
                submitBtn.disabled = false;
            }
        });

        // Auto-redirect if already logged in
        (function bootstrap() {
            const studentSession = localStorage.getItem(STUDENT_STORAGE_KEY);
            const driverSession = localStorage.getItem(DRIVER_STORAGE_KEY);

            if (studentSession) {
                window.location.href = "bus-dashboard.html";
            } else if (driverSession) {
                window.location.href = "driver-workspace.html";
            }
        })();
    </script>
</body>
</html>
